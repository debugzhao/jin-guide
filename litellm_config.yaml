model_list:
  # 轻量模型：Profile Agent、Retrieval Agent（query rewrite）
  - model_name: profile-agent
    litellm_params:
      model: openai/kimi-k2.6
      api_base: os.environ/MOONSHOT_BASE_URL
      api_key: os.environ/MOONSHOT_API_KEY

  - model_name: retrieval-agent
    litellm_params:
      model: openai/kimi-k2.6
      api_base: os.environ/MOONSHOT_BASE_URL
      api_key: os.environ/MOONSHOT_API_KEY

  # 主力模型：Report Agent、Reflection Agent、人工复核底稿
  - model_name: report-agent
    litellm_params:
      model: openai/kimi-k2.6
      api_base: os.environ/MOONSHOT_BASE_URL
      api_key: os.environ/MOONSHOT_API_KEY

  - model_name: reflection-agent
    litellm_params:
      model: openai/kimi-k2.6
      api_base: os.environ/MOONSHOT_BASE_URL
      api_key: os.environ/MOONSHOT_API_KEY

  - model_name: review-draft-agent
    litellm_params:
      model: openai/kimi-k2.6
      api_base: os.environ/MOONSHOT_BASE_URL
      api_key: os.environ/MOONSHOT_API_KEY

  # Embedding（Moonshot 兼容 OpenAI embedding 接口）
  - model_name: text-embedding-3-small
    litellm_params:
      model: openai/moonshot-v1-emb-small
      api_base: os.environ/MOONSHOT_BASE_URL
      api_key: os.environ/MOONSHOT_API_KEY

router_settings:
  routing_strategy: simple-shuffle
  fallbacks:
    - report-agent: [reflection-agent]
    - reflection-agent: [report-agent]
    - profile-agent: [retrieval-agent]
    - retrieval-agent: [profile-agent]

litellm_settings:
  success_callback: ["langsmith"]
  failure_callback: ["langsmith"]
  max_budget: 20.0
  budget_duration: "1d"
  drop_params: true
  set_verbose: false
  request_timeout: 60
